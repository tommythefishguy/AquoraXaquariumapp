<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquoraX</title>
<style>
body{margin:0;font-family:Arial;background:#02070d;color:#fff}
.page{padding:20px;max-width:700px;margin:auto}
.card{background:#06121d;border:1px solid #0af;border-radius:18px;padding:16px;margin-bottom:14px}
h2{margin:0 0 10px}
input,select{width:100%;padding:12px;border-radius:12px;background:#000;color:#fff;border:1px solid #0af;margin-bottom:10px}
button{padding:14px;border:none;border-radius:14px;background:#0af;color:#001;font-weight:bold;width:100%}
.small{font-size:13px;color:#9fbcd3}
.status{font-size:18px;font-weight:bold}
.good{color:#63f7a3}
.mid{color:#ffd36a}
.bad{color:#ff6b6b}
</style>
</head>

<body>

<div class="page">

<div class="card">
<h2>Blue Shark Dosing</h2>

<label>Tank Type</label>
<select id="tank">
<option value="fresh">Freshwater</option>
<option value="reef">Reef</option>
</select>

<label>Volume (L)</label>
<input id="vol" type="number" oninput="calc()">

<div id="dose"></div>

<button onclick="rapid()">Confirm Rapid Cycle Added</button>
<div id="rapidLog" class="small"></div>

<button onclick="para()">Confirm Paradigm Added</button>
<div id="paraLog" class="small"></div>

</div>

<div class="card">
<h2>Water Test</h2>
<input id="a" placeholder="Ammonia">
<input id="n2" placeholder="Nitrite">
<input id="n3" placeholder="Nitrate">
<button onclick="save()">Save Test</button>
</div>

<div class="card">
<h2>Cycle Status & Guidance</h2>
<div id="status" class="status"></div>
<p id="what"></p>
<p id="do"></p>
<div id="conf" class="small"></div>
</div>

</div>

<script>
function calc(){
let v=parseFloat(vol.value)
if(!v)return
let c = tank.value==="reef"?v*(118/45):v*(118/95)
let p = v*(5/37.85)
dose.innerHTML = "Colony: "+Math.round(c)+"ml<br>Paradigm: "+Math.round(p)+"ml"
}

function rapid(){
if(!confirm("Confirm Rapid Cycle?"))return
let t=new Date()
localStorage.setItem("rapid",t)
rapidLog.innerText="Added "+t.toLocaleString()
}

function para(){
let t=new Date()
let arr=JSON.parse(localStorage.getItem("para")||"[]")
arr.push(t)
localStorage.setItem("para",JSON.stringify(arr))
paraLog.innerText="Last "+t.toLocaleString()
}

function save(){
let d={
a:parseFloat(a.value),
n2:parseFloat(n2.value),
n3:parseFloat(n3.value),
t:new Date()
}
let h=JSON.parse(localStorage.getItem("h")||"[]")
h.push(d)
localStorage.setItem("h",JSON.stringify(h))
guide()
}

function guide(){
let h=JSON.parse(localStorage.getItem("h")||"[]")
if(h.length<1){
status.innerText="No Data"
what.innerText=""
do.innerText="Add test results"
return
}
let l=h[h.length-1]
if(l.a>0.25){
status.innerHTML='<span class="bad">Cycle Starting</span>'
what.innerText="Ammonia present"
do.innerText="Keep testing, no fish"
conf.innerText="Low"
return
}
if(l.a<0.1 && l.n2>0.5){
status.innerHTML='<span class="mid">Mid Cycle</span>'
what.innerText="Nitrite phase"
do.innerText="Wait, keep testing"
conf.innerText="Medium"
return
}
if(l.a<0.1 && l.n2<0.1 && l.n3>0){
status.innerHTML='<span class="good">Cycled</span>'
what.innerText="Bio filter established"
do.innerText="Add fish slowly"
conf.innerText="High"
return
}
status.innerText="Tracking"
what.innerText="Building data"
do.innerText="Keep testing"
}

guide()
</script>

</body>
</html>
